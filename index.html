<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تحليل مشاريع الشركة</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex flex-col overflow-hidden">

    <!-- شريط علوي أنيق -->
    <header class="bg-slate-800 text-white py-4 px-6 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-400">لوحة تحكم وتحليل المشاريع المشتركة</h1>
        <span class="text-xs text-slate-400">مربوطة بالدرايف ومحدثة تلقائياً</span>
    </header>

    <!-- تضمين تقرير Looker Studio الذي قمت بتصميمه -->
    <main class="flex-grow w-full h-full">
        <!-- استبدل الرابط أدناه برابط الـ Embed الخاص بتقريرك -->
        <iframe 
            src="https://lookerstudio.google.com/embed/reporting/رابط_تقريرك_هنا" 
            style="border:0; width:100%; height:100%;" 
            allowfullscreen 
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
        </iframe>
    </main>

</body>
</html>
